<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Plan — CLA 2026</title>
<script src="../sport_data.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FAFAF6; --surface: #FFFFFF; --surface-warm: #FFF7F2;
  --surface2: #F4F2EC; --border: #E8E5DD; --border-strong: #D3D1C7;
  --accent: #D85A30; --accent-dark: #993C1D; --accent-soft: #FAECE7;
  --amber: #BA7517; --amber-soft: #FAEEDA;
  --green: #639922; --green-soft: #EAF3DE; --green-dark: #3B6D11;
  --red: #A32D2D; --red-soft: #FCEBEB;
  --blue: #185FA5; --blue-soft: #E6F1FB;
  --purple: #534AB7; --purple-soft: #EEEDFE;
  --text: #2C2C2A; --text-secondary: #5F5E5A; --text-muted: #888780;
  --font-sans: 'Inter', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); background: var(--bg); color: var(--text);
  -webkit-font-smoothing: antialiased; }

/* Header */
.plan-header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 12px 20px; display: flex; align-items: center;
  justify-content: space-between; gap: 12px; flex-wrap: wrap;
  position: sticky; top: 0; z-index: 10;
}
.plan-title { font-size: 14px; font-weight: 600; }
.plan-sub { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); }
.nav-btns { display: flex; gap: 6px; align-items: center; }
.nav-btn {
  background: var(--surface2); border: none; border-radius: 6px;
  padding: 6px 12px; font-size: 12px; font-weight: 500;
  cursor: pointer; color: var(--text-secondary);
  transition: all 0.12s ease;
}
.nav-btn:hover { background: var(--border); color: var(--text); }
.nav-btn.active { background: var(--accent); color: #fff; }
.week-label { font-size: 13px; font-weight: 600; color: var(--text);
  font-family: var(--font-mono); min-width: 160px; text-align: center; }
.back-btn {
  font-size: 11px; color: var(--text-muted); cursor: pointer;
  padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border);
  background: none; transition: all 0.12s;
}
.back-btn:hover { color: var(--accent); border-color: var(--accent); }

/* Phase banner */
.phase-banner {
  margin: 10px 16px 0; padding: 8px 14px;
  border-radius: 8px; border-left: 3px solid var(--accent);
  background: var(--accent-soft); font-size: 12px;
}
.phase-name { font-weight: 600; color: var(--accent-dark); }
.phase-focus { color: var(--text-secondary); margin-top: 2px; font-size: 11px; }
.phase-constraints { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
.phase-constraint {
  font-size: 10px; padding: 2px 7px; border-radius: 999px;
  background: var(--accent-soft-strong, #F5C4B3); color: var(--accent-dark);
  border: 1px solid var(--accent-soft-strong, #F5C4B3);
}

/* Layout : panneau récap + calendrier */
.plan-layout { display: flex; gap: 12px; align-items: flex-start; padding: 12px 16px; }
.week-grid {
  display: grid; grid-template-columns: repeat(7, 1fr);
  gap: 6px; min-height: auto; flex: 1 1 auto; min-width: 0;
}

/* Panneau récap */
.recap-panel { flex: 0 0 190px; display: flex; flex-direction: column; gap: 10px; }
.recap-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 11px 12px;
}
.recap-card h3 {
  font-size: 9px; font-weight: 700; letter-spacing: 0.6px; text-transform: uppercase;
  color: var(--text-muted); margin-bottom: 8px;
}
.recap-big { font-size: 22px; font-weight: 700; font-family: var(--font-mono); line-height: 1; }
.recap-sub { font-size: 11px; color: var(--text-secondary); margin-top: 3px; }
.recap-missed { color: var(--accent-dark); font-weight: 600; }
.recap-ok { color: var(--green-dark); font-weight: 600; }
.recap-row { display: flex; justify-content: space-between; align-items: baseline; padding: 4px 0; border-top: 1px solid var(--border); }
.recap-row:first-of-type { border-top: none; }
.recap-row .rk { font-size: 10px; color: var(--text-muted); }
.recap-row .rv { font-size: 14px; font-weight: 700; font-family: var(--font-mono); color: var(--text); }
.recap-sport-ttl { font-size: 11px; font-weight: 700; margin-bottom: 2px; }
.recap-bike { color: var(--accent-dark); }
.recap-run  { color: var(--green-dark); }
@media (max-width: 820px) {
  .plan-layout { flex-direction: column; }
  .recap-panel { flex: 1 1 auto; width: 100%; flex-direction: row; flex-wrap: wrap; }
  .recap-card { flex: 1 1 45%; }
}
.day-col {
  display: flex; flex-direction: column; gap: 6px;
  min-height: 100px;
}
.day-header {
  text-align: center; padding: 6px 2px;
  border-radius: 6px; font-size: 11px;
}
.day-header .dow { font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
.day-header .dom { font-size: 18px; font-weight: 700; font-family: var(--font-mono); line-height: 1; margin-top: 2px; }
.day-header.today { background: var(--accent); color: #fff; }
.day-header.today .dow { color: rgba(255,255,255,0.8); }
.day-header.past .dom { color: var(--text-muted); }

/* Session card */
.session-card {
  border-radius: 8px; padding: 8px 9px;
  border: 1px solid transparent; cursor: pointer;
  transition: all 0.12s ease; font-size: 11px;
}
.session-card:hover { transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.session-card.bike    { background: var(--accent-soft); border-color: #F5C4B3; }
.session-card.run     { background: var(--green-soft); border-color: #C5DFA0; }
.session-card.strength{ background: var(--purple-soft); border-color: #C5C2EF; }
.session-card.rest    { background: var(--surface2); border-color: var(--border); }
/* Séance réalisée : une seule couleur (bleu), quel que soit le sport */
.session-card.done    { background: var(--blue-soft) !important; border-color: #AECBE8 !important; opacity: 1; }
.session-card.done .s-sport-pill { color: var(--blue) !important; }
.session-card.done .s-name { color: var(--blue) !important; }
.session-card.done::after { content: '✓'; float: right; color: var(--blue); font-weight: 700; }

/* Modal détail séance */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(20,18,16,0.55);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; padding: 16px; -webkit-backdrop-filter: blur(2px); backdrop-filter: blur(2px);
}
.modal-box {
  background: var(--surface); border: 1px solid var(--border-strong);
  border-radius: 14px; padding: 20px 20px 22px; max-width: 380px; width: 100%;
  box-shadow: 0 12px 40px rgba(0,0,0,0.22); position: relative;
}
.modal-close {
  position: absolute; top: 12px; right: 12px; border: none; background: var(--surface2);
  width: 26px; height: 26px; border-radius: 50%; cursor: pointer; font-size: 13px; color: var(--text-secondary);
}
.modal-close:hover { background: var(--border); color: var(--text); }
.m-pill { font-size: 10px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; }
.m-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 4px; line-height: 1.25; padding-right: 24px; }
.m-meta { font-family: var(--font-mono); font-size: 12px; color: var(--accent-dark); font-weight: 600; margin-bottom: 12px; }
.m-desc { font-size: 13px; line-height: 1.6; color: var(--text-secondary); white-space: normal;
  background: var(--surface-warm); border-left: 3px solid var(--accent); border-radius: 6px; padding: 10px 12px; }
.m-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 12px; }
.m-stats > div { background: var(--surface2); border-radius: 7px; padding: 7px 8px; text-align: center; }
.m-stats span { display: block; font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.4px; }
.m-stats b { font-size: 14px; font-family: var(--font-mono); color: var(--text); }
.m-link { display: inline-block; margin-top: 14px; font-size: 12px; font-weight: 600; color: var(--blue); text-decoration: none; }
.m-link:hover { text-decoration: underline; }

.s-sport-pill {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 9px; font-weight: 700; letter-spacing: 0.6px;
  text-transform: uppercase; margin-bottom: 4px;
}
.bike    .s-sport-pill { color: var(--accent-dark); }
.run     .s-sport-pill { color: var(--green-dark); }
.strength .s-sport-pill { color: #534AB7; }

.s-name { font-weight: 600; line-height: 1.3; color: var(--text); margin-bottom: 3px; }
.s-meta { color: var(--text-muted); font-family: var(--font-mono); font-size: 10px; }
.s-zone { display: inline-block; font-size: 9px; font-weight: 700;
  padding: 1px 5px; border-radius: 4px; margin-top: 3px;
  background: rgba(0,0,0,0.06); color: var(--text-secondary); }

.rest-card { text-align: center; padding: 10px 4px;
  color: var(--text-muted); font-size: 10px; }

/* Legend */
.legend {
  display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
  padding: 4px 16px 12px; font-size: 10px; color: var(--text-muted);
}
.legend-item { display: flex; align-items: center; gap: 4px; }
.legend-dot { width: 10px; height: 10px; border-radius: 3px; }

/* Week row separator */
.week-row-sep {
  grid-column: 1 / -1;
  padding: 6px 0 2px;
  font-size: 10px; font-weight: 600; font-family: var(--font-mono);
  color: var(--text-muted); letter-spacing: 0.5px;
  border-top: 1px solid var(--border); margin-top: 4px;
}

@media (max-width: 800px) {
  .week-grid { grid-template-columns: repeat(7,1fr); gap: 3px; padding: 8px; }
  .session-card { padding: 5px 6px; }
  .s-name { font-size: 10px; }
}

/* ── Pastilles suivi ── */
.day-tracker{display:flex;gap:4px;padding:6px 4px 2px;justify-content:center;flex-wrap:wrap;}
.pastille{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);
  background:var(--surface);cursor:pointer;font-size:10px;font-weight:700;
  font-family:var(--font-mono);display:flex;align-items:center;justify-content:center;
  transition:all .12s;-webkit-tap-highlight-color:transparent;color:var(--text-muted);}
.pastille:active{transform:scale(.9);}
.pastille.p-done{background:var(--green);border-color:var(--green);color:#fff;}
.pastille.p-0{background:#3B6D11;border-color:#3B6D11;color:#fff;}
.pastille.p-1{background:#639922;border-color:#639922;color:#fff;}
.pastille.p-2{background:#BA7517;border-color:#BA7517;color:#fff;}
.pastille.p-3{background:#E65100;border-color:#E65100;color:#fff;}
.pastille.p-4{background:#C62828;border-color:#C62828;color:#fff;}
.pastille.p-5{background:#8B0000;border-color:#8B0000;color:#fff;}
.pastille-label{font-size:8px;color:var(--text-muted);text-align:center;
  letter-spacing:.3px;margin-top:1px;}
.day-tracker-wrap{padding:4px 2px 6px;}
</style>
</head>
<body>

<header class="plan-header">
  <div>
    <div class="plan-title">Plan d'entraînement</div>
    <div class="plan-sub" id="plan-sub">CLA · 2026</div>
  </div>
  <div class="nav-btns">
    <button class="nav-btn" id="btn-prev" onclick="shiftWeek(-1)">◀</button>
    <span class="week-label" id="week-label">—</span>
    <button class="nav-btn" id="btn-next" onclick="shiftWeek(+1)">▶</button>
    <button class="nav-btn" onclick="goToToday()" style="margin-left:4px">Aujourd'hui</button>
  </div>
  <button class="back-btn" onclick="window.parent.postMessage({type:'switch-tab',target:'log'},'*')">
    ← Log
  </button>
</header>

<div id="phase-banner" class="phase-banner" style="display:none">
  <div class="phase-name" id="phase-name"></div>
  <div class="phase-focus" id="phase-focus"></div>
  <div class="phase-constraints" id="phase-constraints"></div>
</div>

<div class="legend">
  <span class="legend-item"><span class="legend-dot" style="background:#FAECE7;border:1px solid #F5C4B3"></span> Vélo</span>
  <span class="legend-item"><span class="legend-dot" style="background:#EAF3DE;border:1px solid #C5DFA0"></span> Running</span>
  <span class="legend-item"><span class="legend-dot" style="background:#EEEDFE;border:1px solid #C5C2EF"></span> Renfo</span>
  <span class="legend-item"><span class="legend-dot" style="background:#F4F2EC;border:1px solid #E8E5DD"></span> Repos</span>
  <span class="legend-item" style="margin-left:8px"><span class="legend-dot" style="background:#E6F1FB;border:1px solid #AECBE8"></span> ✓ Réalisé (bleu)</span>
  <span class="legend-item" style="margin-left:8px;font-style:italic">Clic sur une séance → détail / analyse</span>
</div>

<div class="plan-layout">
  <aside class="recap-panel" id="recap-panel"></aside>
  <div class="week-grid" id="week-grid"></div>
</div>

<div id="detail-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeDetail()">
  <div class="modal-box">
    <button class="modal-close" onclick="closeDetail()" aria-label="Fermer">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<script>
const DATA = window.SPORT_DATA || {};
const sessions = DATA.sessions || [];
const phases   = DATA.phases || [];

// Index sessions by date
const byDate = {};
sessions.forEach(s => {
  if (!byDate[s.date]) byDate[s.date] = [];
  byDate[s.date].push(s);
});

let currentMonday = getMonday(new Date());

function getMonday(d) {
  const dt = new Date(d);
  const day = dt.getDay();
  const diff = (day === 0 ? -6 : 1 - day);
  dt.setDate(dt.getDate() + diff);
  dt.setHours(0,0,0,0);
  return dt;
}

function isoDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function todayISO() { return isoDate(new Date()); }

function shiftWeek(delta) {
  currentMonday.setDate(currentMonday.getDate() + delta * 28);
  render();
}
function goToToday() {
  currentMonday = getMonday(new Date());
  render();
}

const DAYS_FR = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
const MONTHS_FR = ['janv','févr','mars','avr','mai','juin','juil','août','sept','oct','nov','déc'];

const SPORT_EMOJI = { bike:'🚴', run:'🏃', strength:'💪', rest:'😴' };
const SPORT_LABEL = { bike:'Vélo', run:'Running', strength:'Renfo', rest:'Repos' };

function getPhaseForDate(iso) {
  return phases.find(p => iso >= p.start_date && iso <= p.end_date) || null;
}

function render() {
  const today = todayISO();
  const days = [];
  for (let i = 0; i < 28; i++) {
    const d = new Date(currentMonday);
    d.setDate(d.getDate() + i);
    days.push(d);
  }

  // Week label (4-week range)
  const start = days[0], end = days[27];
  document.getElementById('week-label').textContent =
    start.getDate() + ' ' + MONTHS_FR[start.getMonth()] +
    ' → ' + end.getDate() + ' ' + MONTHS_FR[end.getMonth()];

  // Phase banner (first phase found across 4 weeks)
  const phase = getPhaseForDate(isoDate(days[0]))
             || getPhaseForDate(isoDate(days[7]))
             || getPhaseForDate(isoDate(days[14]))
             || getPhaseForDate(isoDate(days[21]));
  const banner = document.getElementById('phase-banner');
  if (phase) {
    banner.style.display = 'block';
    document.getElementById('phase-name').textContent = phase.name;
    document.getElementById('phase-focus').textContent = phase.focus;
    const cEl = document.getElementById('phase-constraints');
    cEl.innerHTML = (phase.key_constraints || []).map(c =>
      `<span class="phase-constraint">⚠ ${c}</span>`).join('');
  } else {
    banner.style.display = 'none';
  }

  // Grid
  const grid = document.getElementById('week-grid');
  grid.innerHTML = '';

  days.forEach((d, i) => {
    // Week row separator before weeks 2, 3, 4
    if (i > 0 && i % 7 === 0) {
      const sep = document.createElement('div');
      sep.className = 'week-row-sep';
      const wStart = days[i];
      const wEnd   = days[i + 6] || days[days.length - 1];
      sep.textContent = 'Sem. ' + wStart.getDate() + ' ' + MONTHS_FR[wStart.getMonth()]
        + ' → ' + wEnd.getDate() + ' ' + MONTHS_FR[wEnd.getMonth()];
      grid.appendChild(sep);
    }

    const iso = isoDate(d);
    const isPast = iso < today;
    const isToday = iso === today;
    const daySessions = byDate[iso] || [];

    const col = document.createElement('div');
    col.className = 'day-col';

    // Day header
    const hdr = document.createElement('div');
    hdr.className = 'day-header' + (isToday ? ' today' : isPast ? ' past' : '');
    hdr.innerHTML = `<div class="dow">${DAYS_FR[d.getDay() === 0 ? 6 : d.getDay()-1]}</div>
                     <div class="dom">${d.getDate()}</div>`;
    col.appendChild(hdr);

    // Sessions
    const activeSessions = daySessions.filter(s => s.sport !== 'rest');
    if (activeSessions.length === 0) {
      const rest = document.createElement('div');
      rest.className = 'rest-card';
      rest.textContent = '😴 Repos';
      col.appendChild(rest);
    } else {
      activeSessions.forEach(s => {
        const p = s.planned || {};
        const card = document.createElement('div');
        card.className = `session-card ${s.sport} ${s.status === 'done' ? 'done' : ''}`;

        const dur = (p.duration_min || (s.executed && s.executed.duration_min));
        const zone = p.primary_zone || '';
        const name = p.name || s.type;

        card.innerHTML = `
          <div class="s-sport-pill">${SPORT_EMOJI[s.sport]||''} ${SPORT_LABEL[s.sport]||s.sport}</div>
          <div class="s-name">${name}</div>
          <div class="s-meta">${dur ? dur + ' min' : ''}${zone ? ' · ' + zone : ''}</div>
        `;
        card.addEventListener('click', () => onSessionClick(s));
        col.appendChild(card);
      });
    }

    col.appendChild(makePastilles(iso));
    grid.appendChild(col);
  });
}

render();
renderRecap();

// ── Panneau récap (réalisé vs prévu, distances) ───────────────
function renderRecap(){
  const tISO = todayISO();
  const t = new Date(); t.setHours(0,0,0,0);
  const daysAgo = iso => (t - new Date(iso + 'T00:00:00')) / 86400000;

  // Adhérence au plan : séances planifiées dont la date est passée
  const plannedPassed = sessions.filter(s => s.status === 'planned' && s.date < tISO);
  const isRealised = p => sessions.some(s => s.status === 'done' && s.date === p.date && s.sport === p.sport);
  const realized = plannedPassed.filter(isRealised).length;
  const totalPlanned = plannedPassed.length;
  const missed = totalPlanned - realized;

  // Distances réalisées
  const km = (sport, days) => sessions
    .filter(s => s.status === 'done' && s.sport === sport && s.executed && s.executed.distance_m
                 && daysAgo(s.date) >= 0 && daysAgo(s.date) < days)
    .reduce((a, s) => a + s.executed.distance_m, 0) / 1000;
  const bike7 = km('bike', 7), bike28 = km('bike', 28);
  const run7 = km('run', 7),  run28 = km('run', 28);

  const adh = totalPlanned === 0
    ? `<div class="recap-big">—</div><div class="recap-sub">aucune séance prévue passée</div>`
    : `<div class="recap-big">${realized}/${totalPlanned}</div><div class="recap-sub">séances réalisées</div>`
      + (missed > 0
          ? `<div class="recap-sub recap-missed">⚠ ${missed} ratée${missed > 1 ? 's' : ''}</div>`
          : `<div class="recap-sub recap-ok">✓ aucune ratée</div>`);

  document.getElementById('recap-panel').innerHTML = `
    <div class="recap-card"><h3>Suivi du plan</h3>${adh}</div>
    <div class="recap-card">
      <h3 class="recap-bike">🚴 Vélo — distance</h3>
      <div class="recap-row"><span class="rk">7 derniers jours</span><span class="rv recap-bike">${bike7.toFixed(0)} km</span></div>
      <div class="recap-row"><span class="rk">4 dernières sem.</span><span class="rv recap-bike">${bike28.toFixed(0)} km</span></div>
    </div>
    <div class="recap-card">
      <h3 class="recap-run">🏃 Course — distance</h3>
      <div class="recap-row"><span class="rk">7 derniers jours</span><span class="rv recap-run">${run7.toFixed(0)} km</span></div>
      <div class="recap-row"><span class="rk">4 dernières sem.</span><span class="rv recap-run">${run28.toFixed(0)} km</span></div>
    </div>`;
}

// ── Détail séance au clic ─────────────────────────────────────
function esc(t){ return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function onSessionClick(s) {
  // Réalisé → ouvre l'activité sur Intervals.icu (analyse complète)
  if (s.status === 'done' && s.intervals_url) {
    window.open(s.intervals_url, '_blank', 'noopener');
    return;
  }
  openDetail(s);
}

function openDetail(s) {
  const p = s.planned || {};
  const e = s.executed || {};
  const done = s.status === 'done';
  let html = `<div class="m-pill">${SPORT_EMOJI[s.sport]||''} ${SPORT_LABEL[s.sport]||s.sport} · ${done ? 'réalisé' : 'à faire'}</div>`;
  html += `<div class="m-title">${esc(p.name || s.strava_activity_name || s.type)}</div>`;
  const dur = p.duration_min || e.duration_min;
  const meta = [];
  if (dur) meta.push(dur + ' min');
  if (p.primary_zone) meta.push(p.primary_zone);
  if (meta.length) html += `<div class="m-meta">${meta.join(' · ')}</div>`;
  if (p.description) {
    let dh = esc(p.description).replace(/\n/g, '<br>');
    // Vélo : ajouter la valeur en watts à côté des % FTP
    if (s.sport === 'bike') {
      const ftp = (DATA.zones && DATA.zones.bike && DATA.zones.bike.power_basis_ftp_w)
                || (DATA.athlete && DATA.athlete.ftp_ref_w) || 262;
      dh = dh.replace(/(\d+)(?:-(\d+))?%/g, (m, a, b) => {
        const wa = Math.round(a / 100 * ftp);
        return b ? `${m} (${wa}–${Math.round(b / 100 * ftp)} W)` : `${m} (${wa} W)`;
      });
    }
    html += `<div class="m-desc">${dh}</div>`;
  }
  if (done) {
    const rows = [
      ['Durée', e.duration_min ? e.duration_min + ' min' : null],
      ['NP', e.np_w ? e.np_w + ' W' : null],
      ['Moy', e.avg_w ? e.avg_w + ' W' : null],
      ['FC moy', e.hr_avg ? e.hr_avg + ' bpm' : null],
      ['TSS', e.tss != null ? e.tss : null],
      ['Dist', e.distance_m ? (e.distance_m/1000).toFixed(1) + ' km' : null],
    ].filter(r => r[1] != null);
    if (rows.length) html += '<div class="m-stats">' + rows.map(r => `<div><span>${r[0]}</span><b>${r[1]}</b></div>`).join('') + '</div>';
    if (s.intervals_url) html += `<a class="m-link" href="${s.intervals_url}" target="_blank" rel="noopener">Voir l'analyse sur Intervals.icu →</a>`;
  }
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('detail-modal').style.display = 'flex';
}
function closeDetail(){ document.getElementById('detail-modal').style.display = 'none'; }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

// ── Tracker suivi intégré ─────────────────────────────────────
const SUIVI_KEY = 'suivi_cla_v1';
function loadSuivi() {
  try { return JSON.parse(localStorage.getItem(SUIVI_KEY) || '{}'); } catch(e) { return {}; }
}
function saveSuivi(d) { localStorage.setItem(SUIVI_KEY, JSON.stringify(d)); }

function makePastilles(iso) {
  const wrap = document.createElement('div');
  wrap.className = 'day-tracker-wrap';
  const row = document.createElement('div');
  row.className = 'day-tracker';

  const data = loadSuivi();
  const dayData = data[iso] || {};

  // Pastille matin
  const pm = document.createElement('div');
  pm.style.textAlign = 'center';
  const btnM = document.createElement('button');
  btnM.className = 'pastille' + (dayData.proto_matin ? ' p-done' : '');
  btnM.title = 'Protocole matin'; btnM.textContent = dayData.proto_matin ? '✓' : 'M';
  btnM.addEventListener('click', () => {
    const d = loadSuivi(); if (!d[iso]) d[iso] = {};
    d[iso].proto_matin = !d[iso].proto_matin; saveSuivi(d);
    btnM.className = 'pastille' + (d[iso].proto_matin ? ' p-done' : '');
    btnM.textContent = d[iso].proto_matin ? '✓' : 'M';
  });
  const lM = document.createElement('div'); lM.className='pastille-label'; lM.textContent='Matin';
  pm.appendChild(btnM); pm.appendChild(lM);

  // Pastille soir
  const ps = document.createElement('div');
  ps.style.textAlign = 'center';
  const btnS = document.createElement('button');
  btnS.className = 'pastille' + (dayData.proto_soir ? ' p-done' : '');
  btnS.title = 'Protocole soir'; btnS.textContent = dayData.proto_soir ? '✓' : 'S';
  btnS.addEventListener('click', () => {
    const d = loadSuivi(); if (!d[iso]) d[iso] = {};
    d[iso].proto_soir = !d[iso].proto_soir; saveSuivi(d);
    btnS.className = 'pastille' + (d[iso].proto_soir ? ' p-done' : '');
    btnS.textContent = d[iso].proto_soir ? '✓' : 'S';
  });
  const lS = document.createElement('div'); lS.className='pastille-label'; lS.textContent='Soir';
  ps.appendChild(btnS); ps.appendChild(lS);

  // Pastille douleur (cycle 0→5)
  const pd = document.createElement('div');
  pd.style.textAlign = 'center';
  const score = dayData.fasciite !== undefined ? dayData.fasciite : null;
  const btnD = document.createElement('button');
  btnD.className = 'pastille' + (score !== null ? ' p-' + score : '');
  btnD.title = 'Douleur fasciite (0=rien · 5=intense)';
  btnD.textContent = score !== null ? score : '?';
  btnD.addEventListener('click', () => {
    const d = loadSuivi(); if (!d[iso]) d[iso] = {};
    const cur = d[iso].fasciite !== undefined ? d[iso].fasciite : -1;
    d[iso].fasciite = cur >= 5 ? 0 : cur + 1; saveSuivi(d);
    btnD.className = 'pastille p-' + d[iso].fasciite;
    btnD.textContent = d[iso].fasciite;
  });
  const lD = document.createElement('div'); lD.className='pastille-label'; lD.textContent='Douleur';
  pd.appendChild(btnD); pd.appendChild(lD);

  row.appendChild(pm); row.appendChild(ps); row.appendChild(pd);
  wrap.appendChild(row);
  return wrap;
}

</script>
