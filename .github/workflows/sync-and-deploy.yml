name: Sync Intervals.icu + Deploy

on:
  schedule:
    - cron: '0 23 * * *'   # 23h UTC = minuit heure belge (CET/CEST)
  workflow_dispatch:         # lancement manuel possible

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Sync Intervals.icu
        env:
          INTERVALS_ATHLETE_ID: ${{ secrets.INTERVALS_ATHLETE_ID }}
          INTERVALS_API_KEY: ${{ secrets.INTERVALS_API_KEY }}
        run: python sync_intervals.py

      - name: Commit sport_data.js
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sport_data.js
          if git diff --staged --quiet; then
            echo "Deja a jour"
          else
            git commit -m "sync: intervals.icu $(date -u '+%Y-%m-%d')"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
